<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>SPP — Silknode Production Platform</title>
    <script>
      // Dev self-heal: a leftover PWA service worker breaks Vite module loading.
      // On localhost, unregister any SW + drop its caches, then reload once.
      (function () {
        var h = location.hostname;
        if ((h === "localhost" || h === "127.0.0.1") && "serviceWorker" in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            if (!regs.length) return;
            Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () {
              if (window.caches) caches.keys().then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); });
              if (!sessionStorage.getItem("__sw_cleared")) {
                sessionStorage.setItem("__sw_cleared", "1");
                location.reload();
              }
            });
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
